<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Quantum gradient for examples -->
    <linearGradient id="examplesGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>

    <!-- Code pattern background -->
    <pattern id="codePattern" x="0" y="0" width="25" height="25" patternUnits="userSpaceOnUse">
      <rect width="25" height="25" fill="none"/>
      <text x="2" y="15" fill="rgba(255,255,255,0.1)" font-family="monospace" font-size="8">&lt;/&gt;</text>
    </pattern>

    <!-- Glow effect -->
    <filter id="glowExamples">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with code pattern -->
  <rect x="10" y="10" width="180" height="180" rx="15" ry="15" fill="url(#codePattern)" stroke="url(#examplesGradient)" stroke-width="2" opacity="0.1"/>

  <!-- Multiple quantum circuits -->
  <g transform="translate(30,40)">
    <!-- Circuit 1: Bell state -->
    <g transform="translate(0,0)">
      <line x1="0" y1="8" x2="50" y2="8" stroke="url(#examplesGradient)" stroke-width="2" opacity="0.7"/>
      <line x1="0" y1="22" x2="50" y2="22" stroke="url(#examplesGradient)" stroke-width="2" opacity="0.7"/>

      <!-- H gate -->
      <rect x="5" y="3" width="10" height="10" fill="url(#examplesGradient)" rx="1" opacity="0.9"/>
      <text x="10" y="11" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="6" font-weight="bold">H</text>

      <!-- CNOT -->
      <circle cx="25" cy="8" r="3" fill="#FFFFFF" opacity="0.9"/>
      <circle cx="25" cy="22" r="2" fill="url(#examplesGradient)" opacity="0.9"/>
      <line x1="25" y1="11" x2="25" y2="19" stroke="url(#examplesGradient)" stroke-width="1" opacity="0.8"/>
      <text x="35" y="11" fill="rgba(255,255,255,0.7)" font-family="Arial, sans-serif" font-size="5">⊕</text>
    </g>

    <!-- Circuit 2: GHZ state -->
    <g transform="translate(0,35)">
      <line x1="0" y1="8" x2="50" y2="8" stroke="url(#examplesGradient)" stroke-width="2" opacity="0.7"/>
      <line x1="0" y1="22" x2="50" y2="22" stroke="url(#examplesGradient)" stroke-width="2" opacity="0.7"/>
      <line x1="0" y1="36" x2="50" y2="36" stroke="url(#examplesGradient)" stroke-width="2" opacity="0.7"/>

      <!-- H gate -->
      <rect x="5" y="3" width="10" height="10" fill="url(#examplesGradient)" rx="1" opacity="0.9"/>
      <text x="10" y="11" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="6" font-weight="bold">H</text>

      <!-- CNOT gates -->
      <circle cx="25" cy="8" r="3" fill="#FFFFFF" opacity="0.9"/>
      <circle cx="25" cy="22" r="2" fill="url(#examplesGradient)" opacity="0.9"/>
      <line x1="25" y1="11" x2="25" y2="19" stroke="url(#examplesGradient)" stroke-width="1" opacity="0.8"/>

      <circle cx="40" cy="22" r="3" fill="#FFFFFF" opacity="0.9"/>
      <circle cx="40" cy="36" r="2" fill="url(#examplesGradient)" opacity="0.9"/>
      <line x1="40" y1="25" x2="40" y2="33" stroke="url(#examplesGradient)" stroke-width="1" opacity="0.8"/>
    </g>
  </g>

  <!-- Example brackets -->
  <text x="15" y="35" fill="url(#examplesGradient)" font-family="Arial, sans-serif" font-size="12" font-weight="bold" opacity="0.8">[</text>
  <text x="175" y="35" fill="url(#examplesGradient)" font-family="Arial, sans-serif" font-size="12" font-weight="bold" opacity="0.8">]</text>
  <text x="15" y="165" fill="url(#examplesGradient)" font-family="Arial, sans-serif" font-size="12" font-weight="bold" opacity="0.8">{</text>
  <text x="175" y="165" fill="url(#examplesGradient)" font-family="Arial, sans-serif" font-size="12" font-weight="bold" opacity="0.8">}</text>

  <!-- Examples title -->
  <text x="100" y="185" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="14" font-weight="bold" opacity="0.9">Examples</text>
</svg>
