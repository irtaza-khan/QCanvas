<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Quantum gradient for icon -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glowIcon">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Central qubit -->
  <circle cx="50" cy="50" r="20" fill="url(#iconGradient)" filter="url(#glowIcon)"/>

  <!-- Quantum state visualization -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="url(#iconGradient)" stroke-width="1" opacity="0.7" stroke-dasharray="3,3"/>
  <circle cx="50" cy="50" r="36" fill="none" stroke="url(#iconGradient)" stroke-width="1" opacity="0.5" stroke-dasharray="2,4"/>

  <!-- Qubit state indicators -->
  <circle cx="38" cy="38" r="2.5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="62" cy="38" r="2.5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="38" cy="62" r="2.5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="62" cy="62" r="2.5" fill="#FFFFFF" opacity="0.9"/>

  <!-- Quantum entanglement lines -->
  <line x1="38" y1="38" x2="62" y2="62" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
  <line x1="62" y1="38" x2="38" y2="62" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
</svg>
