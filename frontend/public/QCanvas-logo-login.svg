<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Quantum gradient for login -->
    <linearGradient id="loginGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Secure pattern background -->
    <pattern id="securePattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="none"/>
      <circle cx="10" cy="10" r="1" fill="rgba(255,255,255,0.2)"/>
      <rect x="7" y="7" width="6" height="6" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
    </pattern>

    <!-- Glow effect -->
    <filter id="glowLogin">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with secure pattern -->
  <rect x="20" y="20" width="160" height="160" rx="20" ry="20" fill="url(#securePattern)" stroke="url(#loginGradient)" stroke-width="2" opacity="0.1"/>

  <!-- Quantum key/lock symbol -->
  <g transform="translate(100,85)">
    <!-- Key bow -->
    <circle cx="0" cy="-15" r="8" fill="url(#loginGradient)" filter="url(#glowLogin)" opacity="0.9"/>

    <!-- Key shaft -->
    <rect x="-2" y="-15" width="4" height="25" fill="url(#loginGradient)" rx="2" opacity="0.8"/>

    <!-- Key teeth -->
    <rect x="-6" y="5" width="4" height="3" fill="url(#loginGradient)" rx="1" opacity="0.8"/>
    <rect x="-6" y="10" width="6" height="3" fill="url(#loginGradient)" rx="1" opacity="0.8"/>
    <rect x="2" y="8" width="4" height="3" fill="url(#loginGradient)" rx="1" opacity="0.8"/>

    <!-- Quantum particles around key -->
    <circle cx="-20" cy="-20" r="3" fill="#FFFFFF" opacity="0.7" filter="url(#glowLogin)"/>
    <circle cx="20" cy="-20" r="3" fill="#FFFFFF" opacity="0.7" filter="url(#glowLogin)"/>
    <circle cx="-20" cy="20" r="3" fill="#FFFFFF" opacity="0.7" filter="url(#glowLogin)"/>
    <circle cx="20" cy="20" r="3" fill="#FFFFFF" opacity="0.7" filter="url(#glowLogin)"/>

    <!-- Energy waves -->
    <path d="M -15 -25 Q 0 -35 15 -25" stroke="url(#loginGradient)" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M -15 25 Q 0 35 15 25" stroke="url(#loginGradient)" stroke-width="2" fill="none" opacity="0.6"/>
  </g>

  <!-- Welcome text -->
  <text x="100" y="150" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="12" font-weight="bold" opacity="0.9">Welcome to</text>
  <text x="100" y="165" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16" font-weight="bold" opacity="0.9">QCanvas</text>

  <!-- Security indicator dots -->
  <circle cx="40" cy="40" r="2" fill="url(#loginGradient)" opacity="0.8"/>
  <circle cx="160" cy="40" r="2" fill="url(#loginGradient)" opacity="0.8"/>
  <circle cx="40" cy="160" r="2" fill="url(#loginGradient)" opacity="0.8"/>
  <circle cx="160" cy="160" r="2" fill="url(#loginGradient)" opacity="0.8"/>
</svg>
