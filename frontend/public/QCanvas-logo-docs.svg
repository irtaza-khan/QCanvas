<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Quantum gradient for docs -->
    <linearGradient id="docsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>

    <!-- Circuit pattern overlay -->
    <pattern id="circuitDocs" x="0" y="0" width="15" height="15" patternUnits="userSpaceOnUse">
      <rect width="15" height="15" fill="none"/>
      <circle cx="7.5" cy="7.5" r="1.5" fill="rgba(255,255,255,0.2)"/>
      <line x1="7.5" y1="0" x2="7.5" y2="5" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
      <line x1="7.5" y1="10" x2="7.5" y2="15" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    </pattern>

    <!-- Glow effect -->
    <filter id="glowDocs">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Book pages background -->
  <rect x="20" y="40" width="160" height="120" rx="8" ry="8" fill="#1a1a1a" stroke="url(#docsGradient)" stroke-width="2" opacity="0.8"/>
  <rect x="25" y="45" width="150" height="110" rx="4" ry="4" fill="#0f0f0f" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Book binding -->
  <rect x="15" y="40" width="15" height="120" rx="2" ry="2" fill="url(#docsGradient)" opacity="0.9"/>
  <circle cx="22.5" cy="60" r="3" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="22.5" cy="80" r="3" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="22.5" cy="100" r="3" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="22.5" cy="120" r="3" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="22.5" cy="140" r="3" fill="#FFFFFF" opacity="0.8"/>

  <!-- Quantum circuit on book page -->
  <g transform="translate(50,70)">
    <!-- Circuit lines -->
    <line x1="0" y1="10" x2="80" y2="10" stroke="url(#docsGradient)" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="30" x2="80" y2="30" stroke="url(#docsGradient)" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="50" x2="80" y2="50" stroke="url(#docsGradient)" stroke-width="2" opacity="0.7"/>

    <!-- Gates -->
    <rect x="10" y="5" width="10" height="10" fill="url(#docsGradient)" rx="1" opacity="0.8"/>
    <rect x="30" y="5" width="10" height="10" fill="url(#docsGradient)" rx="1" opacity="0.8"/>
    <rect x="50" y="5" width="10" height="10" fill="url(#docsGradient)" rx="1" opacity="0.8"/>

    <!-- Control dots -->
    <circle cx="15" cy="35" r="3" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="35" cy="55" r="3" fill="#FFFFFF" opacity="0.9"/>

    <!-- Connection lines -->
    <line x1="15" y1="15" x2="15" y2="32" stroke="url(#docsGradient)" stroke-width="1" opacity="0.6"/>
    <line x1="35" y1="15" x2="35" y2="52" stroke="url(#docsGradient)" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Documentation title -->
  <text x="100" y="175" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="14" font-weight="bold" opacity="0.9">Documentation</text>
</svg>
