[pytest]
# Only run QCanvas's own test suite by default.
testpaths =
    tests

# Avoid collecting tests from bundled/vendor folders or virtualenvs.
norecursedirs =
    Cirq-RAG-Code-Assistant
    quantum_simulator/tests
    quantum_simulator/.venv
    qcanvas_env
    node_modules
    .git
    .next
    dist
    build

markers =
    unit: unit tests
    integration: integration tests
    e2e: end-to-end tests

# Keep output readable in CI/dev.
addopts = -ra

