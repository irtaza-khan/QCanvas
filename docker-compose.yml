version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: qcanvas_postgres
    environment:
      POSTGRES_DB: qcanvas_db
      POSTGRES_USER: qcanvas_user
      POSTGRES_PASSWORD: qcanvas_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - qcanvas_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qcanvas_user -d qcanvas_db"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: qcanvas_redis
    command: redis-server --appendonly yes --requirepass qcanvas_redis_password
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - qcanvas_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # QCanvas Backend API
  backend:
    build:
      context: .
      dockerfile: config/docker/Dockerfile.backend
    container_name: qcanvas_backend
    environment:
      - DATABASE_URL=postgresql://qcanvas_user:qcanvas_password@postgres:5432/qcanvas_db
      - REDIS_URL=redis://:qcanvas_redis_password@redis:6379/0
      - SECRET_KEY=qcanvas-secret-key-change-in-production
      - DEBUG=False
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    networks:
      - qcanvas_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/simple"]
      interval: 30s
      timeout: 10s
      retries: 3

  # QCanvas Frontend
  frontend:
    build:
      context: .
      dockerfile: config/docker/Dockerfile.frontend
    container_name: qcanvas_frontend
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_WS_URL=ws://localhost:8000/ws
      - NODE_ENV=production
    ports:
      - "3000:3000"
    networks:
      - qcanvas_network
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: qcanvas_nginx
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - qcanvas_network
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: qcanvas_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./config/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - qcanvas_network
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: qcanvas_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=qcanvas_grafana_password
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/docker/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3001:3000"
    networks:
      - qcanvas_network
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  qcanvas_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
