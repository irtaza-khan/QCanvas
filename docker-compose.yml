version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: qcanvas_postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-qcanvas_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - qcanvas_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: qcanvas_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - qcanvas_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Cirq-RAG-Code-Assistant (QCanvas IDE "Cirq AI"). Set AWS_* and BEDROCK_* in project root .env (see Cirq-RAG-Code-Assistant/.env.example).
  cirq_agent:
    build:
      context: ./Cirq-RAG-Code-Assistant
      dockerfile: Dockerfile
    container_name: qcanvas_cirq_agent
    ports:
      - "8001:8000"
    env_file:
      - ./Cirq-RAG-Code-Assistant/.env
    environment:
      - PYTHONPATH=/app
      # Do not pass AWS_ACCESS_KEY_ID / AWS_SECRET with ${VAR:-} here: unset host vars become
      # empty strings in the container and block python-dotenv from reading the mounted .env.
      # Put keys in Cirq-RAG-Code-Assistant/.env or pass real values explicitly below if needed.
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
    volumes:
      - ./Cirq-RAG-Code-Assistant:/app
    command: [ "uvicorn", "src.server:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=5).read(1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    networks:
      - qcanvas_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: qcanvas_backend
    working_dir: /app/backend
    ports:
      - "8000:8000"
    environment:
      # Use Compose DNS names (not localhost) from inside container
      - POSTGRES_SERVER=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-qcanvas_db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=${REDIS_DB:-0}
      - PYTHONPATH=/app
      # Proxy to Cirq service on the Compose network (internal port 8000)
      - CIRQ_AGENT_URL=http://cirq_agent:8000
    volumes:
      # Dev hot-reload (no rebuild needed for code changes)
      - ./backend:/app/backend
      - ./quantum_converters:/app/quantum_converters
      - ./quantum_simulator:/app/quantum_simulator
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cirq_agent:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - qcanvas_network

  sonarqube:
    image: sonarqube:community
    container_name: qcanvas_sonarqube
    profiles: ["metrics"]
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - qcanvas_network

volumes:
  postgres_data:
  redis_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:


networks:
  qcanvas_network:
    driver: bridge
