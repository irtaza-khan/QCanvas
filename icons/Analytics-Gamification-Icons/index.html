<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Icon Gallery</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f8fc;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
      --border: rgba(15, 23, 42, 0.08);
      --accent: #2563eb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --surface: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --shadow: 0 10px 30px rgba(2, 6, 23, 0.55);
        --border: rgba(148, 163, 184, 0.24);
        --accent: #60a5fa;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 32px 18px;
    }

    .page {
      width: min(1120px, 100%);
    }

    .title {
      text-align: center;
      margin: 0 0 8px;
      font-size: clamp(1.35rem, 2.4vw, 2rem);
      letter-spacing: 0.01em;
    }

    .subtitle {
      text-align: center;
      margin: 0 0 26px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .notice {
      margin: 0 auto 18px;
      width: fit-content;
      max-width: 100%;
      color: var(--muted);
      font-size: 0.86rem;
      text-align: center;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 16px;
    }

    .icon-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 14px 12px;
      min-height: 162px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
      transform: translateY(14px) scale(0.98);
      transition: opacity 480ms ease, transform 480ms ease;
      transition-delay: calc(var(--stagger-index, 0) * 45ms);
    }

    .icon-card.is-visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .icon-wrap {
      width: 90px;
      height: 90px;
      display: grid;
      place-items: center;
      color: var(--accent);
      margin-top: 4px;
    }

    .icon-wrap .icon-svg {
      width: 72px;
      height: 72px;
      overflow: visible;
    }

    .label {
      margin-top: 12px;
      text-align: center;
      font-size: 0.84rem;
      line-height: 1.3;
      color: var(--text);
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .error {
      font-size: 0.8rem;
      color: #ef4444;
      text-align: center;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <main class="page">
    <h1 class="title">Animated Analytics & Gamification Icons</h1>
    <p class="subtitle">Stroke-draw SVG gallery with hover-to-loop interaction</p>
    <p class="notice" id="protocol-note" hidden>
      Local file mode detected. Run with a local server for SVG loading to work reliably.
    </p>
    <section class="grid" id="icon-grid" aria-label="SVG icon gallery"></section>
  </main>

  <script>
    const ICON_FILES = [
      "activity-arrow-svgrepo-com.svg",
      "award-medal-badge-2-svgrepo-com.svg",
      "barchart-svgrepo-com (1).svg",
      "barchart-svgrepo-com.svg",
      "flame-danger-svgrepo-com.svg",
      "flame-svgrepo-com.svg",
      "medal-sherif-badge-svgrepo-com.svg",
      "rocket-svgrepo-com.svg",
      "star-svgrepo-com.svg",
      "target-and-arrow-svgrepo-com.svg",
      "target-svgrepo-com.svg",
      "trending-up-svgrepo-com.svg",
      "trophy-winner-prize-svgrepo-com.svg"
    ];

    const TOTAL_ANIMATION_SECONDS = 1.0;

    const grid = document.getElementById("icon-grid");
    const protocolNote = document.getElementById("protocol-note");

    if (location.protocol === "file:") {
      protocolNote.hidden = false;
    }

    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-visible");
            observer.unobserve(entry.target);
          }
        });
      },
      { threshold: 0.14 }
    );

    function toTitleCase(raw) {
      const cleaned = raw
        .replace(/\.svg$/i, "")
        .replace(/-svgrepo-com/gi, "")
        .replace(/\(\d+\)/g, "")
        .replace(/[-_]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();

      return cleaned
        .split(" ")
        .filter(Boolean)
        .map((word) => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
        .join(" ");
    }

    function cleanSvgMarkup(markup) {
      return markup
        .replace(/<\?xml[\s\S]*?\?>/gi, "")
        .replace(/<!--[\s\S]*?-->/g, "")
        .trim();
    }

    function getPathLength(node) {
      if (typeof node.getTotalLength === "function") {
        const length = node.getTotalLength();
        if (Number.isFinite(length) && length > 0) return length;
      }

      const box = node.getBBox?.();
      if (box && Number.isFinite(box.width) && Number.isFinite(box.height)) {
        return Math.max(36, 2 * (box.width + box.height));
      }

      return 120;
    }

    function prepareStrokeDraw(svg) {
      const drawables = [...svg.querySelectorAll("path, circle, rect, line, polyline, polygon, ellipse")]
        .filter((el) => !el.closest("defs"));

      if (!drawables.length) return { totalDuration: TOTAL_ANIMATION_SECONDS };

      const sharedDur = drawables.length === 1 ? TOTAL_ANIMATION_SECONDS : 0.56;
      const maxStart = Math.max(0, TOTAL_ANIMATION_SECONDS - sharedDur);
      const step = drawables.length <= 1 ? 0 : maxStart / (drawables.length - 1);

      drawables.forEach((shape, index) => {
        const length = getPathLength(shape);
        const strokeWidth = shape.getAttribute("stroke-width") || "1.8";

        shape.setAttribute("fill", "none");
        shape.setAttribute("stroke", "currentColor");
        shape.setAttribute("stroke-width", strokeWidth);
        shape.setAttribute("stroke-linecap", "round");
        shape.setAttribute("stroke-linejoin", "round");

        shape.style.strokeDasharray = `${length}`;
        shape.style.strokeDashoffset = `${length}`;

        const anim = document.createElementNS("http://www.w3.org/2000/svg", "animate");
        anim.setAttribute("attributeName", "stroke-dashoffset");
        anim.setAttribute("from", String(length));
        anim.setAttribute("to", "0");
        anim.setAttribute("dur", `${sharedDur}s`);
        anim.setAttribute("begin", "indefinite");
        anim.setAttribute("fill", "freeze");
        anim.setAttribute("calcMode", "spline");
        anim.setAttribute("keyTimes", "0;1");
        anim.setAttribute("keySplines", "0.33 0 0.25 1");
        anim.dataset.delay = String(index * step);
        anim.classList.add("stroke-draw");

        shape.appendChild(anim);
      });

      return { totalDuration: TOTAL_ANIMATION_SECONDS };
    }

    function playOnce(svg) {
      const animations = [...svg.querySelectorAll("animate.stroke-draw")];
      if (!animations.length) return;

      animations.forEach((anim) => {
        const parent = anim.parentElement;
        if (!parent) return;

        const base = Number(parent.style.strokeDasharray) || 120;
        parent.style.strokeDashoffset = String(base);
      });

      animations.forEach((anim) => {
        const delay = Number(anim.dataset.delay || 0);
        window.setTimeout(() => {
          try {
            anim.beginElement();
          } catch {
            /* ignore */
          }
        }, Math.max(0, delay * 1000));
      });
    }

    function clearLoop(card) {
      if (card._loopTimer) {
        window.clearInterval(card._loopTimer);
        card._loopTimer = null;
      }
    }

    async function loadIconCard(fileName, index) {
      const card = document.createElement("article");
      card.className = "icon-card";
      card.style.setProperty("--stagger-index", index);

      const wrap = document.createElement("div");
      wrap.className = "icon-wrap";

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = toTitleCase(fileName);

      card.append(wrap, label);
      grid.appendChild(card);
      observer.observe(card);

      try {
        const response = await fetch(encodeURI(fileName));
        if (!response.ok) {
          throw new Error(`Failed to load ${fileName}: ${response.status}`);
        }

        const raw = await response.text();
        const clean = cleanSvgMarkup(raw);
        const doc = new DOMParser().parseFromString(clean, "image/svg+xml");
        const svg = doc.documentElement;

        svg.classList.add("icon-svg");
        svg.setAttribute("aria-hidden", "true");
        svg.removeAttribute("width");
        svg.removeAttribute("height");

        const { totalDuration } = prepareStrokeDraw(svg);
        svg.dataset.totalDuration = String(totalDuration);

        wrap.appendChild(svg);

        playOnce(svg);

        card.addEventListener("mouseenter", () => {
          clearLoop(card);
          playOnce(svg);

          const intervalMs = (Number(svg.dataset.totalDuration) || TOTAL_ANIMATION_SECONDS) * 1000;
          card._loopTimer = window.setInterval(() => playOnce(svg), intervalMs + 40);
        });

        card.addEventListener("mouseleave", () => {
          clearLoop(card);
          playOnce(svg);
        });
      } catch (error) {
        const err = document.createElement("p");
        err.className = "error";
        err.textContent = "Could not load SVG";
        wrap.appendChild(err);
        console.error(error);
      }
    }

    (async function init() {
      for (let i = 0; i < ICON_FILES.length; i += 1) {
        await loadIconCard(ICON_FILES[i], i);
      }
    })();
  </script>
</body>
</html>
