<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Test-Pypi-Imports</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #111936;
      --panel-2: #0f1630;
      --text: #e8ecff;
      --muted: #aeb7e6;
      --accent: #64d2ff;
      --accent-2: #8fffce;
      --border: rgba(255,255,255,0.12);
      --error: #ff7b7b;
      --ok: #94f7a0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(100,210,255,0.14), transparent 34%),
        radial-gradient(circle at bottom right, rgba(143,255,206,0.14), transparent 30%),
        var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 0.02em;
    }
    p.sub {
      margin: 8px 0 0;
      color: var(--muted);
    }
    .badge {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      color: var(--accent-2);
      font-size: 0.92rem;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
    }
    .card {
      background: rgba(17,25,54,0.86);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.28);
      overflow: hidden;
    }
    .card h2 {
      margin: 0;
      padding: 16px 18px;
      font-size: 1rem;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
    }
    textarea {
      width: 100%;
      min-height: 520px;
      resize: vertical;
      border: 0;
      outline: 0;
      padding: 18px;
      background: transparent;
      color: var(--text);
      font-family: Consolas, Monaco, "SFMono-Regular", monospace;
      font-size: 0.94rem;
      line-height: 1.55;
    }
    .toolbar {
      display: flex;
      gap: 12px;
      padding: 16px 18px 18px;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    select {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border-radius: 12px;
      padding: 12px 14px;
      min-width: 180px;
      outline: none;
    }
    button {
      border: 0;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), #7c8cff);
      color: #06101a;
      padding: 12px 16px;
      border-radius: 12px;
      font-weight: 700;
    }
    button:disabled { opacity: 0.6; cursor: wait; }
    .helper {
      color: var(--muted);
      font-size: 0.9rem;
    }
    pre {
      margin: 0;
      padding: 18px;
      min-height: 520px;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      font-family: Consolas, Monaco, "SFMono-Regular", monospace;
      font-size: 0.93rem;
      line-height: 1.52;
    }
    .status {
      padding: 0 18px 18px;
      font-size: 0.92rem;
      color: var(--muted);
    }
    .alert {
      margin: 0 18px 18px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }
    .alert.visible { display: block; }
    .alert.ok {
      border-color: rgba(148,247,160,0.25);
      background: rgba(148,247,160,0.08);
      color: var(--ok);
    }
    .alert.err {
      border-color: rgba(255,123,123,0.25);
      background: rgba(255,123,123,0.08);
      color: var(--error);
    }
    .ok { color: var(--ok); }
    .err { color: var(--error); }
    @media (max-width: 960px) {
      .grid { grid-template-columns: 1fr; }
      textarea, pre { min-height: 380px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Test-Pypi-Imports</h1>
        <p class="sub">Write Cirq source code, compile it with <strong>qcanvas</strong>, and see the OpenQASM output.</p>
      </div>
      <div class="badge">Demo app for qcanvas import + compile</div>
    </header>

    <div class="grid">
      <section class="card">
        <h2>Cirq code</h2>
        <textarea id="code"></textarea>
        <div class="toolbar">
          <div class="controls">
            <select id="framework">
              <option value="cirq">Cirq</option>
              <option value="qiskit">Qiskit</option>
              <option value="pennylane">PennyLane</option>
            </select>
            <button id="compileBtn">Compile</button>
          </div>
          <div class="helper">Pick a framework, paste its source code, then click Compile.</div>
        </div>
      </section>

      <section class="card">
        <h2>OpenQASM output</h2>
        <pre id="output">Press Compile to generate OpenQASM.</pre>
        <div id="alert" class="alert"></div>
        <div class="status" id="status">Idle</div>
      </section>
    </div>
  </div>

  <script>
    const codeEl = document.getElementById('code');
    const frameworkEl = document.getElementById('framework');
    const outputEl = document.getElementById('output');
    const alertEl = document.getElementById('alert');
    const statusEl = document.getElementById('status');
    const compileBtn = document.getElementById('compileBtn');

    const samples = {
      cirq: `import cirq
  from qcanvas import compile

  def get_circuit():
    q0, q1 = cirq.LineQubit.range(2)
    return cirq.Circuit(
      cirq.H(q0),
      cirq.CNOT(q0, q1),
      cirq.measure(q0, q1, key="m")
    )
  `,
      qiskit: `from qiskit import QuantumCircuit
  from qcanvas import compile

  def get_circuit():
    circuit = QuantumCircuit(2, 2)
    circuit.h(0)
    circuit.cx(0, 1)
    circuit.measure([0, 1], [0, 1])
    return circuit
  `,
      pennylane: `import pennylane as qml
  from qcanvas import compile

  def get_circuit():
    dev = qml.device("default.qubit", wires=2)

    @qml.qnode(dev)
    def circuit():
      qml.Hadamard(wires=0)
      qml.CNOT(wires=[0, 1])
      return qml.state()

    return circuit
  `
    };

    function setSample(framework) {
      codeEl.value = samples[framework] || samples.cirq;
    }

    function showAlert(kind, message) {
      alertEl.className = `alert visible ${kind}`;
      alertEl.textContent = message;
    }

    function clearAlert() {
      alertEl.className = 'alert';
      alertEl.textContent = '';
    }

    frameworkEl.addEventListener('change', () => {
      setSample(frameworkEl.value);
      clearAlert();
      outputEl.textContent = 'Press Compile to generate OpenQASM.';
      statusEl.textContent = 'Idle';
    });

    async function compileCode() {
      compileBtn.disabled = true;
      statusEl.textContent = 'Compiling...';
      outputEl.textContent = '';
      clearAlert();
      try {
        const response = await fetch('/compile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: codeEl.value, framework: frameworkEl.value })
        });
        const result = await response.json();
          if (result.ok) {
          outputEl.textContent = result.qasm || '';
          showAlert('ok', 'Compilation succeeded. The OpenQASM output is shown above.');
          statusEl.innerHTML = '<span class="ok">Compilation successful.</span>';
        } else {
          outputEl.textContent = result.error || 'Unknown error';
          showAlert('err', result.error || 'Compilation failed.');
          statusEl.innerHTML = '<span class="err">Compilation failed.</span>';
        }
      } catch (error) {
        outputEl.textContent = String(error);
        showAlert('err', 'Network or server error. Check the backend logs and try again.');
        statusEl.innerHTML = '<span class="err">Network or server error.</span>';
      } finally {
        compileBtn.disabled = false;
      }
    }

    compileBtn.addEventListener('click', compileCode);
    setSample('cirq');
  </script>
</body>
</html>
