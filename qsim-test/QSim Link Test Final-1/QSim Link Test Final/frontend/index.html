<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastQSim IDE | Quantum Playground</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Monaco Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
</head>
<body>
    <header>
        <div class="logo">FastQSim IDE</div>
        <div class="status-indicator">
            <div id="connection-dot" class="dot"></div>
            <span id="connection-text">Checking Backend...</span>
        </div>
    </header>

    <main>
        <!-- Editor Panel -->
        <section class="panel">
            <div class="panel-header" style="flex-wrap: wrap; gap: 8px;">
                <span class="panel-title" id="editor-panel-title">OpenQASM 3.0</span>
                <div class="run-mode-toggle" style="display: flex; gap: 12px; align-items: center; font-size: 0.85rem;">
                    <label style="cursor: pointer;"><input type="radio" name="run-mode" value="qasm" checked> OpenQASM (HTTP / SDK)</label>
                    <label style="cursor: pointer;" title="Runs on your session pod via kernel WebSocket (X-WS-Token is applied on the server)."><input type="radio" name="run-mode" value="pod"> Python (pod)</label>
                </div>
                <select id="example-select" style="margin-left: auto;">
                    <option value="bell">Bell State</option>
                    <option value="ghz">GHZ State (3 qubits)</option>
                    <option value="qft">QFT (4 qubits)</option>
                    <option value="bv">Bernstein-Vazirani</option>
                </select>
            </div>
            <div id="editor-wrap-qasm" class="editor-wrap">
                <div id="editor-container"></div>
            </div>
            <div id="editor-wrap-python" class="editor-wrap" style="display: none;">
                <div id="python-editor-container"></div>
            </div>
        </section>

        <!-- Results Panel -->
        <section class="panel results-panel">
            <div class="panel-header">
                <div class="tabs">
                    <div class="tab active" data-tab="histogram">Histogram</div>
                    <div class="tab" data-tab="statevector">Statevector</div>
                    <div class="tab" data-tab="json">Raw JSON</div>
                    <div class="tab" data-tab="history">History</div>
                    <div class="tab" data-tab="pod">Pod output</div>
                </div>
                <span id="timer" style="font-family: var(--font-mono); font-size: 0.8rem; color: var(--text-muted); display: none;">00:00.0</span>
            </div>
            
            <div id="histogram" class="tab-content active">
                <div class="histogram-placeholder" style="color: var(--text-muted); text-align: center; margin-top: 40px;">
                    Run a circuit to see results
                </div>
            </div>
            
            <div id="statevector" class="tab-content">
                <table id="sv-table" style="width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 0.85rem;">
                    <thead>
                        <tr style="text-align: left; color: var(--text-muted); border-bottom: 1px solid var(--border);">
                            <th style="padding: 8px;">State</th>
                            <th style="padding: 8px;">Amplitude</th>
                        </tr>
                    </thead>
                    <tbody id="sv-body"></tbody>
                </table>
            </div>
            
            <div id="json" class="tab-content">
                <pre id="json-output">// Run a job to see raw response</pre>
            </div>

            <div id="history" class="tab-content">
                <div id="history-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
            </div>

            <div id="pod" class="tab-content">
                <pre id="pod-output" style="margin: 0; padding: 12px; font-family: var(--font-mono); font-size: 0.8rem; white-space: pre-wrap; word-break: break-word; color: var(--text); max-height: 70vh; overflow: auto;">Run Python (pod) mode to stream execute results here.</pre>
            </div>
        </section>

        <!-- Sidebar Controls -->
        <aside class="sidebar">
            <div class="control-group">
                <label>Backend</label>
                <select id="backend-select">
                    <option value="qiskit">Qiskit (Default)</option>
                    <option value="cirq">Cirq</option>
                    <option value="pennylane">PennyLane</option>
                </select>
            </div>

            <div class="control-group">
                <label>Simulation Type</label>
                <select id="sim-type-select">
                    <option value="statevector">Statevector</option>
                    <option value="density_matrix">Density Matrix</option>
                    <option value="mps">MPS (Matrix Product State)</option>
                    <option value="chp">CHP (Clifford)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Shots: <span id="shots-val">2048</span></label>
                <div class="range-wrap">
                    <input type="range" id="shots-range" min="1" max="8192" value="2048">
                </div>
            </div>

            <div class="control-group">
                <label>Job Name (Optional)</label>
                <input type="text" id="job-name" placeholder="e.g. My Bell Test">
            </div>

            <div class="control-group" style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Seed</label>
                    <input type="number" id="seed" placeholder="Random">
                </div>
                <div style="flex: 1;">
                    <label>Device</label>
                    <select id="device-select">
                        <option value="cpu">CPU</option>
                        <option value="gpu">GPU</option>
                    </select>
                </div>
            </div>

            <div style="margin-top: 32px;">
                <button id="run-btn" class="btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    Run Simulation
                </button>
                <button id="cancel-btn" class="btn-secondary" style="display: none;">Cancel Job</button>
            </div>
        </aside>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
